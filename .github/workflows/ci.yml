name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Type check
        run: python -m mypy src/alphaloop --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=src/alphaloop --cov-report=term-missing \
            --cov-fail-under=45
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t alphaloop:test .
      - name: Verify health endpoint
        run: |
          docker run -d --name test-alphaloop -p 8090:8090 alphaloop:test
          sleep 5
          curl -f http://localhost:8090/health
          docker stop test-alphaloop
